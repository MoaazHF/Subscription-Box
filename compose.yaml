services:
  postgres:
    image: postgres:17-alpine
    container_name: subscription-box-postgres
    ports:
      - '5435:5432'
    environment:
      POSTGRES_DB: '${DB_DATABASE:-subscription_box}'
      POSTGRES_USER: '${DB_USERNAME:-subscription_box}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
      POSTGRES_TEST_DATABASE: '${DB_TEST_DATABASE:-subscription_box_test}'
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C.UTF-8'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-subscription_box} -d ${DB_DATABASE:-subscription_box}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:9.8
    container_name: subscription-box-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${FORWARD_PGADMIN_PORT:-5050}:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: '${PGADMIN_DEFAULT_EMAIL:-admin@example.com}'
      PGADMIN_DEFAULT_PASSWORD: '${PGADMIN_DEFAULT_PASSWORD:-secret}'
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    restart: unless-stopped

volumes:
  postgres-data:
  pgadmin-data:
